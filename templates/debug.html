<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Debug – ClasseViva Dashboard</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <style>
    .debug-page { padding: 2rem 0; }
    .debug-warning {
      background: color-mix(in srgb, #f59e0b 15%, transparent);
      border: 1px solid #f59e0b;
      border-radius: var(--radius);
      padding: 1rem 1.5rem;
      margin-bottom: 2rem;
      color: #fbbf24;
      display: flex;
      align-items: center;
      gap: .75rem;
    }
    .debug-section { margin-bottom: 2rem; }
    .debug-title {
      font-family: var(--font-mono);
      font-size: .8rem;
      color: var(--muted);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: .5rem;
    }
    pre.json-block {
      background: var(--card-deep);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      overflow-x: auto;
      font-family: var(--font-mono);
      font-size: .82rem;
      line-height: 1.6;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .api-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 1rem; }
    .api-link {
      display: block;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .75rem 1rem;
      color: var(--accent);
      text-decoration: none;
      font-family: var(--font-mono);
      font-size: .85rem;
      transition: border-color .2s;
    }
    .api-link:hover { border-color: var(--accent); }
  </style>
</head>
<body>

<header class="site-header" role="banner">
  <div class="header-inner">
    <div class="header-brand">
      <a href="/" class="btn btn-ghost btn-sm" aria-label="Torna alla dashboard">
        ← Dashboard
      </a>
    </div>
    <h1 style="font-size:1rem; color: var(--muted);">Debug Panel</h1>
    <div></div>
  </div>
</header>

<main class="container debug-page" id="main-content" tabindex="-1">

  <div class="debug-warning" role="alert">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" 
         stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
      <line x1="12" y1="9" x2="12" y2="13"/>
      <line x1="12" y1="17" x2="12.01" y2="17"/>
    </svg>
    <span>
      <strong>Pagina di debug</strong> — disponibile solo in <code>FLASK_ENV=development</code>.
      Non esporre mai questa pagina su Internet.
    </span>
  </div>

  <div class="debug-section">
    <div class="debug-title">API endpoints rapidi</div>
    <div class="api-grid">
      <a href="/api/voti" class="api-link" target="_blank">/api/voti</a>
      <a href="/api/medie" class="api-link" target="_blank">/api/medie</a>
      <a href="/api/status" class="api-link" target="_blank">/api/status</a>
      <a href="/api/export/csv" class="api-link" target="_blank">/api/export/csv</a>
      <a href="/api/export/csv?type=medie" class="api-link" target="_blank">/api/export/csv?type=medie</a>
    </div>
  </div>

  <div class="debug-section">
    <div class="debug-title">Dati raw (JSON)</div>
    <pre class="json-block" id="jsonBlock">{{ data }}</pre>
  </div>

  <div class="debug-section">
    <div class="debug-title">Log app (ultimi 50 righe)</div>
    <pre class="json-block" id="logBlock">Caricamento log...</pre>
  </div>

</main>

<script>
  // Carica log via fetch
  fetch('/api/status').then(r => r.json()).then(d => {
    document.getElementById('logBlock').textContent = JSON.stringify(d, null, 2);
  }).catch(e => {
    document.getElementById('logBlock').textContent = 'Errore caricamento status: ' + e;
  });
</script>
</body>
</html>
